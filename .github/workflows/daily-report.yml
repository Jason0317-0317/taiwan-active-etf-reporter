name: Daily active ETF report

on:
  schedule:
    # UTC 09:30 = 台灣 17:30，週一至週五盤後執行
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-active-etf-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Crawl, compare and email
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          ETF_TICKERS: ${{ vars.ETF_TICKERS }}
        run: python reporter.py
      - name: Save daily snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports
          git diff --cached --quiet || git commit -m "data: update active ETF holdings $(date -u +%F)"
          git push

